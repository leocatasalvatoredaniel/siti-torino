<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surly's Barbershop - Barbiere di classe a Torino</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #d4af37;
            --accent: #c41e3a;
            --text: #ffffff;
            --bg: #0f0f0f;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            color: var(--text);
            background-color: var(--bg);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 2px;
        }

        /* ANIMAZIONI */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            }
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, rgba(26, 26, 26, 0.95) 100%);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--secondary);
            animation: fadeInDown 0.6s ease-out;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 2px;
        }

        .header-phone {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--secondary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .header-phone:hover {
            color: var(--accent);
            transform: scale(1.05);
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, rgba(196, 30, 58, 0.1) 100%), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><pattern id="pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><path d="M 0 0 L 100 100 M 100 0 L 0 100" stroke="%23d4af37" stroke-width="0.5" opacity="0.1"/></pattern></defs><rect fill="%231a1a1a" width="1200" height="600"/><rect fill="url(%23pattern)" width="1200" height="600"/></svg>');
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            z-index: 10;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 1rem;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .hero h1 span {
            color: var(--secondary);
        }

        .hero p {
            font-size: clamp(1rem, 3vw, 1.3rem);
            margin-bottom: 2rem;
            color: #b0b0b0;
            font-style: italic;
        }

        .cta-button {
            display: inline-block;
            padding: 1rem 3rem;
            background-color: var(--accent);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px solid var(--accent);
            transition: all 0.3s ease;
            cursor: pointer;
            letter-spacing: 1px;
            animation: glow 2s ease-in-out infinite;
        }

        .cta-button:hover {
            background-color: transparent;
            color: var(--accent);
            transform: scale(1.05);
        }

        /* SEZIONE SERVIZI */
        .services {
            background: var(--primary);
            padding: 4rem 2rem;
            margin-top: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--text);
        }

        .section-title span {
            color: var(--secondary);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(196, 30, 58, 0.05) 100%);
            border: 2px solid var(--secondary);
            padding: 2rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .service-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .service-card p {
            color: #b0b0b0;
            font-size: 0.95rem;
        }

        /* ORARI */
        .hours {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(196, 30, 58, 0.08) 100%);
            padding: 3rem 2rem;
            border-radius: 8px;
            margin-top: 3rem;
            border: 1px solid var(--secondary);
        }

        .hours h3 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: var(--secondary);
            text-align: center;
        }

        .hours-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            text-align: center;
        }

        .hour-item {
            padding: 1rem;
            background: rgba(15, 15, 15, 0.5);
            border-radius: 4px;
            border-left: 3px solid var(--secondary);
        }

        .hour-item strong {
            color: var(--secondary);
            display: block;
            margin-bottom: 0.5rem;
        }

        /* GALLERIA */
        .gallery {
            background: var(--bg);
            padding: 4rem 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid var(--secondary);
            aspect-ratio: 3 / 4;
            animation: fadeInUp 0.8s ease-out;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* RECENSIONI */
        .reviews {
            background: var(--primary);
            padding: 4rem 2rem;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .review-card {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.9) 0%, rgba(196, 30, 58, 0.05) 100%);
            border: 1px solid var(--secondary);
            padding: 2rem;
            border-radius: 8px;
            animation: fadeInUp 0.8s ease-out;
        }

        .stars {
            color: var(--secondary);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .review-text {
            color: #b0b0b0;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .review-author {
            color: var(--secondary);
            font-weight: 600;
        }

        /* MAPPA */
        .map-section {
            background: var(--bg);
            padding: 4rem 2rem;
        }

        .map-container {
            position: relative;
            width: 100%;
            height: 400px;
            border: 2px solid var(--secondary);
            border-radius: 8px;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .location-info {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
            text-align: center;
        }

        .location-info h3 {
            color: var(--secondary);
            font-size: 1.5rem;
        }

        .location-info a {
            color: var(--secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .location-info a:hover {
            color: var(--accent);
        }

        /* CTA FINALE */
        .cta-section {
            background: linear-gradient(135deg, var(--accent) 0%, rgba(196, 30, 58, 0.8) 100%);
            padding: 4rem 2rem;
            text-align: center;
        }

        .cta-section h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .cta-section p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .cta-button-primary {
            display: inline-block;
            padding: 1rem 3rem;
            background-color: var(--primary);
            color: var(--secondary);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .cta-button-primary:hover {
            background-color: transparent;
            color: var(--primary);
            border-color: var(--primary);
        }

        /* FOOTER */
        footer {
            background: var(--primary);
            border-top: 2px solid var(--secondary);
            padding: 2rem;
            text-align: center;
            color: #808080;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-logo {
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 2px;
        }

        .footer-tagline {
            font-style: italic;
            margin-bottom: 1.5rem;
            color: #a0a0a0;
            font-size: 0.95rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--accent);
        }

        .footer-bottom {
            border-top: 1px solid var(--secondary);
            padding-top: 1.5rem;
            font-size: 0.9rem;
        }
