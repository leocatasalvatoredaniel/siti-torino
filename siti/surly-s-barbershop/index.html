<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surly's Barbershop - Barberia Autentica a Torino</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Header e Navigazione */
        header {
            background-color: #1a1a1a;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #8b0000;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Barlow', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
        }

        .logo span {
            color: #8b0000;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #8b0000;
        }

        .phone-header {
            color: #8b0000;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .phone-header:hover {
            color: #ffffff;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            padding: 120px 20px;
            text-align: center;
            border-bottom: 3px dashed #8b0000;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139,0,0,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139,0,0,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Barlow', sans-serif;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
            animation: slideDown 0.8s ease;
        }

        .hero h1 span {
            color: #8b0000;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 40px;
            color: #cccccc;
            animation: slideUp 0.8s ease;
        }

        .cta-button {
            display: inline-block;
            background-color: #8b0000;
            color: #ffffff;
            padding: 16px 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 2px solid #8b0000;
            transition: all 0.3s ease;
            animation: slideUp 0.8s ease;
        }

        .cta-button:hover {
            background-color: transparent;
            color: #8b0000;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 1;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 1;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Sezione Servizi */
        .servizi {
            padding: 80px 20px;
            background-color: #0f0f0f;
        }

        .section-title {
            font-family: 'Barlow', sans-serif;
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }

        .section-title span {
            color: #8b0000;
        }

        .servizi-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .servizio-card {
            background-color: #1a1a1a;
            padding: 40px;
            border: 2px solid #333333;
            transition: all 0.3s ease;
            text-align: center;
        }

        .servizio-card:hover {
            border-color: #8b0000;
            transform: translateY(-5px);
        }

        .servizio-icon {
            font-size: 48px;
            color: #8b0000;
            margin-bottom: 20px;
        }

        .servizio-card h3 {
            font-family: 'Barlow', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .servizio-card p {
            color: #cccccc;
            font-size: 14px;
        }

        /* Sezione Foto */
        .foto {
            padding: 80px 20px;
            background-color: #1a1a1a;
        }

        .foto-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .foto-item {
            background: linear-gradient(135deg, #333333, #1a1a1a);
            aspect-ratio: 1;
            border: 2px dashed #8b0000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #8b0000;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .foto-item:hover {
            background: linear-gradient(135deg, #8b0000, #5c0000);
            color: #ffffff;
        }

        /* Sezione Orari */
        .orari {
            padding: 80px 20px;
            background-color: #0f0f0f;
        }

        .orari-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 50px;
            border-left: 4px solid #8b0000;
        }

        .orari-container h3 {
            font-family: 'Barlow', sans-serif;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .orario-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333333;
            font-size: 16px;
        }

        .orario-item:last-child {
            border-bottom: none;
        }

        .orario-giorno {
            font-weight: 600;
            color: #ffffff;
        }

        .orario-ora {
            color: #8b0000;
            font-weight: 700;
        }

        /* Sezione Recensioni */
        .recensioni {
            padding: 80px 20px;
            background-color: #1a1a1a;
        }

        .recensioni-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .recensione-card {
            background-color: #0f0f0f;
            padding: 30px;
            border-top: 3px solid #8b0000;
        }

        .stars {
            color: #8b0000;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .recensione-testo {
            color: #cccccc;
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .recensione-autore {
            font-weight: 600;
            color: #ffffff;
            font-family: 'Barlow', sans-serif;
        }

        /* Sezione Contatti e Mappa */
        .contatti-mappa {
            padding: 80px 20px;
            background-color: #0f0f0f;
        }

        .contatti-mappa-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .info-contatti {
            background-color: #1a1a1a;
            padding: 50px;
            border: 2px solid #333333;
        }

        .info-contatti h3 {
            font-family: 'Barlow', sans-serif;
            font-size: 28px;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .info-item {
            margin-bottom: 25px;
        }

        .info-label {
            font-weight: 600;
            color: #8b0000;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-valore {
            font-size: 18px;
            color: #ffffff;
        }

        .info-valore a {
            color: #8b0000;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .info-valore a:hover {
            color: #ffffff;
        }

        .mappa {
            width: 100%;
            height: 400px;
            border: 2px solid #8b0000;
            background: linear-gradient(135deg, #1a1a1a, #333333);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8b0000;
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            padding: 40px 20px;
            border-top: 2px solid #8b0000;
            text-align: center;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        footer p {
            color: #cccccc;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .footer-brand {
            font-family: 'Barlow', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .footer-brand span {
            color: #8b0000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav ul {
                gap: 15px;
                font-size: 12px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 16px;
            }

            .section-title {
                font-size: 32px;
            }

            .contatti-mappa-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .servizi-grid {
                grid-template-columns: 1fr;
            }

            .mappa {
                height: 300px;
            }

            .info-contatti {
                padding: 30px;
            }

            .orari-container {
                padding: 30px;
            }

            nav {
                display: none;
            }

            .header-container {
                flex-direction: column;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px;
            }

            .cta-button {
                padding: 14px 30px;
                font-size: 14px;
            }

            .section-title {
                font-size: 24px;
            }

            .servizio-card {
                padding: 25px;
            }

            .phone-header {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">SURLY'S <span>BARBERSHOP</span></div>
            <nav>
                <ul>
                    <li><a href="#servizi">Servizi</a></li>
                    <li><a href="#foto">Foto</a></li>
                    <li><a href="#orari">Orari</a></li>
                    <li><a href="#contatti">Contatti</a></li>
                </ul>
            </nav>
            <a href="tel:338676 0292" class="phone-header">338 676 0292</a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Barberia <span>Autentica</span> a Torino</h1
